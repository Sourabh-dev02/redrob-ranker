approach_summary: >
  Hybrid scoring system combining structured candidate analysis with optional
  semantic embedding reranking. Phase 1 scores all 100k candidates using
  weighted structured signals: technical skills match (core + nice-to-have),
  career history analysis (detecting real IR/ML system building from job
  descriptions), experience years fit, 23 behavioral signals from Redrob,
  and location match. Phase 2 semantically reranks the top-500 using
  sentence-transformers (all-MiniLM-L6-v2) cosine similarity against a JD
  query. Hard penalties for: consulting-only careers, non-technical current
  titles (Marketing/HR/etc), honeypot profiles. Career history descriptions
  are analysed for plain-language signals (ranking, retrieval, recommendation,
  search) so Tier 5 candidates who built real systems but dont use jargon
  still rank correctly.

